<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac Lab Weather</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap');
    </style>
</head>
<body>

    <!-- Top bar: location name + current time -->
    <header id="topbar">
        <span id="location-name"><!-- filled by JS --></span>
        <span id="clock"></span>
    </header>

    <!-- Main layout: two columns -->
    <main id="dashboard">

        <!-- LEFT COLUMN: static panels -->
        <aside id="static-panels">

            <!-- Current conditions -->
            <section class="panel" id="obs-panel">
                <h2>Current Conditions</h2>
                <div id="obs-content">
                    <div class="obs-row">
                        <span class="obs-label">Station</span>
                        <span class="obs-value" id="obs-station">--</span>
                    </div>
                    <div class="obs-row">
                        <span class="obs-label">Time</span>
                        <span class="obs-value" id="obs-time">--</span>
                    </div>
                    <div class="obs-row">
                        <span class="obs-label">Temperature</span>
                        <span class="obs-value" id="obs-temp">--</span>
                    </div>
                    <div class="obs-row">
                        <span class="obs-label">Dewpoint</span>
                        <span class="obs-value" id="obs-dewpoint">--</span>
                    </div>
                    <div class="obs-row">
                        <span class="obs-label">Wind</span>
                        <span class="obs-value" id="obs-wind">--</span>
                    </div>
                    <div class="obs-row">
                        <span class="obs-label">Visibility</span>
                        <span class="obs-value" id="obs-vis">--</span>
                    </div>
                    <div class="obs-row">
                        <span class="obs-label">Pressure</span>
                        <span class="obs-value" id="obs-altimeter">--</span>
                    </div>
                    <div class="obs-row">
                        <span class="obs-label">Weather</span>
                        <span class="obs-value" id="obs-sky">--</span>
                    </div>
                    <div id="obs-metar-header">Most recent METAR:</div>
                    <div id="obs-metar">--</div>
                </div>
            </section>

            <!-- 12-hour forecast -->
            <section class="panel" id="forecast-short-panel">
                <h2>Hourly Forecast</h2>
                <div id="forecast-short-content">
                    <!-- Rows inserted by JS -->
                </div>
            </section>

        </aside>

        <!-- RIGHT AREA: cycling panels -->
        <section id="cycling-area">

            <!-- Panel title + cycle indicator -->
            <div id="cycle-header">
                <span id="cycle-title">--</span>
                <div id="cycle-dot">
                    <!-- Dots inserted by JS -->
                </div>
                <span id="cycle-status">▶</span>
            </div>

            <!-- The cycling content itself -->
            <div id="cycle-content">

                <!-- GOES Visible / GeoColor -->
                <div class="cycle-panel" id="panel-satellite-vis">
                    <div class="loop-container">
                        <img class="loop-frame" id="satellite-vis-img" src="" alt="GOES Visible">
                    </div>
                </div>

                <!-- GOES IR -->
                <div class="cycle-panel" id="panel-satellite-ir">
                    <div class="loop-container">
                        <img class="loop-frame" id="satellite-ir-img" src="" alt="GOES IR">
                    </div>
                </div>

                <!-- 5-day forecast -->
                <div class="cycle-panel" id="panel-forecast-daily">
                    <div id="forecast-daily-content">
                        <!-- Inserted by JS -->
                    </div>
                </div>

                <div class="cycle-panel" id="panel-nws-alerts">
                    <img class="noaa-full" src="api/noaa/alerts">
                </div>

                <div class="cycle-panel" id="panel-wpc-analysis">
                    <img class="noaa-full" src="api/noaa/wpc_analysis_color">
                </div>

                <div class="cycle-panel" id="panel-nws-radar">
                    <img class="noaa-full" src="api/noaa/radar">
                </div>

                <div class="cycle-panel" id="panel-radar">
                    <div class="loop-container">
                        <img class="loop-frame" id="radar-img" src="" alt="MRMS Radar">
                    </div>
                </div>

                <div class="cycle-panel" id="panel-hrrr">
                    <div class="loop-container">
                        <img class="loop-frame" id="hrrr-img" src="" alt="HRRR Surface" width="100%">
                    </div>
                </div>

                <div class="cycle-panel" id="panel-spc">
                    <div id="spc-container">
                        <img id="spc-categorical" src="/api/spc/categorical" alt="SPC Categorical Outlook">
                        <div id="spc-sidebar">
                            <img class="spc-prob" src="/api/spc/tornado" alt="Tornado">
                            <img class="spc-prob" src="/api/spc/hail"    alt="Hail">
                            <img class="spc-prob" src="/api/spc/wind"    alt="Wind">
                        </div>
                    </div>
                </div>

                <div class="cycle-panel" id="panel-spc-outlooks">
                    <div id="spc-forecast-grid">
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/spc/day2" alt="SPC Day 2">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/spc/day3" alt="SPC Day 3">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/spc/day4" alt="SPC Day 4">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/spc/day5" alt="SPC Day 5">
                        </div>
                    </div>
                </div>

                <div class="cycle-panel" id="panel-ne-sat-1">
                    <div id="ne-sat-grid-1">
                        <div class="ne-sat-cell">
                            <img class="loop-frame" id="ne-sat-vis-img" src="" alt="NE Visible">
                        </div>
                        <div class="ne-sat-cell">
                            <img class="loop-frame" id="ne-sat-ir-img" src="" alt="NE IR">
                        </div>
                    </div>
                </div>

                <div class="cycle-panel" id="panel-ne-sat-2">
                    <div id="ne-sat-grid-2">
                        <div class="ne-sat-cell">
                            <img class="loop-frame" id="ne-sat-cloud-img" src="" alt="NE Cloud">
                        </div>
                        <div class="ne-sat-cell">
                            <img class="loop-frame" id="ne-sat-band9-img" src="" alt="NE Band 9">
                        </div>
                     </div>
                </div>

                <div class="cycle-panel" id="panel-noaa">
                    <div id="noaa-grid">
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/noaa/wpc_analysis" alt="Surface Analysis">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/noaa/wpc_analysis_color" alt="WPC Prog Chart">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/noaa/rainfall" alt="WPC Rainfall Outlook">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/noaa/hazards_3_7" alt="Day 3-7 Hazards">
                        </div>
                    </div>
                </div>

                <div class="cycle-panel" id="panel-cpc-1">
                    <div id="cpc-1-grid">
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/cpc/6_10_temp" alt="6-10 Day Temp">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/cpc/6_10_precip" alt="6-10 Day Precip">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/cpc/8_14_temp" alt="8-14 Day Temp">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/cpc/8_14_precip" alt="8-14 Day Temp">
                        </div>
                    </div>
                </div>

                <div class="cycle-panel" id="panel-cpc-2">
                    <div id="cpc-2-grid">
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/cpc/3_4_temp" alt="3-4 Week Temp">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/cpc/3_4_precip" alt="3-4 Week Precip">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/cpc/1mo_temp" alt="1 Month Temp">
                        </div>
                        <div class="noaa-cell">
                            <img class="noaa-fcst" src="/api/cpc/1mo_precip" alt="1 Month Temp">
                        </div>
                    </div>
                </div>

            </div>

        </section>

    </main>

    <script src="/static/main.js"></script>
</body>
</html>
